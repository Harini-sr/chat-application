<div class="container-fluid bg-secondary">
  <nav class="navbar">
    <a href="#" class="col-md-12 col-12 text-end">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="22" fill="currentColor" class="bi bi-chat-dots" viewBox="0 0 16 16">
        <path d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
        <path d="m2.165 15.803.02-.004c1.83-.363 2.948-.842 3.468-1.105A9 9 0 0 0 8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6a10.4 10.4 0 0 1-.524 2.318l-.003.011a11 11 0 0 1-.244.637c-.079.186.074.394.273.362a22 22 0 0 0 .693-.125m.8-3.108a1 1 0 0 0-.287-.801C1.618 10.83 1 9.468 1 8c0-3.192 3.004-6 7-6s7 2.808 7 6-3.004 6-7 6a8 8 0 0 1-2.088-.272 1 1 0 0 0-.711.074c-.387.196-1.24.57-2.634.893a11 11 0 0 0 .398-2"/>
      </svg>
    </a>
  </nav>
</div>

<main>
  <div class="container-fluid row bg-light"> 
    <div class="col-12"> 
      <div class="card mt-3 m-5">
      <div class="card-body text-end" style="height: 570px;">
        <ul class="float-left">
          <li  class="text-style leftside">
            {{ data.Message }}
   
          <svg (click)="speakText(data.Message)"
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          fill="currentColor"
          class="bi bi-volume-up ms-2"
          viewBox="0 0 16 16"
          role="button"
          aria-label="Speak"
        >
          <path d="M11.536 14.01a.75.75 0 0 1-1.06 0l-3.182-3.182H4.75A.75.75 0 0 1 4 10.08V5.921c0-.414.336-.75.75-.75h2.544l3.182-3.182a.75.75 0 0 1 1.06 0 .75.75 0 0 1 0 1.06L9.155 5.17v5.66l2.381 2.381a.75.75 0 0 1 0 1.06Z"/>
        </svg>

          <div>
            {{ data.Timestamp | date: 'shortTime' }}
          </div>
          </li>
        </ul>



        <ul class="float-end">
          <li *ngFor="let saved of saveValue" class="text-style ">
            {{ saved }}
            <svg (click)="speakText(saved)"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-volume-up ms-2"
              viewBox="0 0 16 16"
              role="button"
              aria-label="Speak"
            >
              <path d="M11.536 14.01a.75.75 0 0 1-1.06 0l-3.182-3.182H4.75A.75.75 0 0 1 4 10.08V5.921c0-.414.336-.75.75-.75h2.544l3.182-3.182a.75.75 0 0 1 1.06 0 .75.75 0 0 1 0 1.06L9.155 5.17v5.66l2.381 2.381a.75.75 0 0 1 0 1.06Z"/>
            </svg>
            <div>
              {{ date | date: 'shortTime' }}
            </div>
          </li>
        </ul>
        
        
        
        
      </div>
      <div class="card-footer">
        
        <div class="position-relative">
       
          <input type="text" class="form-control w-100 " placeholder="Type something" #input>
        
        
          <svg (click)="send(input.value, input)"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-send position-absolute top-50 translate-middle-y end-0 me-5"
            viewBox="0 0 16 16"
            role="button"
            aria-label="Send"
          >
            <path
              d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"
            />
          </svg>
        
          <!-- Cancel Icon -->
          <svg (click)="reset(input)"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-x position-absolute top-50 translate-middle-y end-0 me-3"
            viewBox="0 0 16 16"
            role="button"
            aria-label="Cancel"
          >
            <path
              d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"
            />
          </svg>
        </div>
        
      </div>
      </div>
    </div>
  </div>
</main>
